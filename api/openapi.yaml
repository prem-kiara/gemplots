openapi: 3.0.3
info:
  title: Gem Plots API
  version: 1.0.0
  description: >
    Phase 1 plots booking platform. Authored from docs/03-api-contracts.md and kept in sync with
    implemented routes (CI gate). Money is integer paise; timestamps are ISO-8601 UTC.
servers:
  - url: /
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }
        request_id: { type: string }
    TokenPair:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        user:
          type: object
          properties:
            id: { type: string, format: uuid }
            phone: { type: string, nullable: true }
            full_name: { type: string }
            role: { type: string }
    ReserveResult:
      type: object
      properties:
        booking_id: { type: string, format: uuid }
        plot_id: { type: string, format: uuid }
        status: { type: string, enum: [PENDING_CONFIRMATION] }
        plot_number: { type: string }
        project_name: { type: string }
        total_price_paise: { type: integer, format: int64 }
        blocked_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        challenge_id: { type: string }
        dev_otp: { type: string, nullable: true }
  responses:
    Error:
      description: Error envelope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
security: []
paths:
  /health:
    get:
      summary: Liveness + dependency check
      responses:
        '200': { description: ok }
  /v1/auth/otp/request:
    post:
      summary: Request a login OTP by email (delivered via the email service + outbox)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties: { email: { type: string, format: email } }
      responses:
        '200':
          description: >-
            challenge issued; dev_otp present only in console mode + non-production (Invariant 12)
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge_id: { type: string }
                  retry_after_seconds: { type: integer }
                  dev_otp: { type: string, nullable: true }
        '429': { $ref: '#/components/responses/Error' }
  /v1/auth/otp/verify:
    post:
      summary: Verify email OTP → tokens (creates the customer by email on first verify)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challenge_id, email, otp]
              properties:
                challenge_id: { type: string }
                email: { type: string, format: email }
                otp: { type: string }
      responses:
        '200':
          description: tokens
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '400': { $ref: '#/components/responses/Error' }
  /v1/auth/refresh:
    post:
      summary: Rotate refresh token (reuse detection revokes the chain)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties: { refresh_token: { type: string } }
      responses:
        '200': { description: rotated tokens }
        '401': { $ref: '#/components/responses/Error' }
  /v1/auth/logout:
    post:
      summary: Revoke a refresh token
      security: [{ bearer: [] }]
      responses: { '204': { description: revoked } }
  /v1/auth/admin/login:
    post:
      summary: Admin email + password login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: tokens
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '401': { $ref: '#/components/responses/Error' }
  /v1/me:
    patch:
      summary: Update the caller's profile (customer profile completion — 08 §9)
      security: [{ bearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                phone: { type: string, nullable: true }
      responses:
        '200': { description: updated profile }
        '403': { $ref: '#/components/responses/Error' }
  /v1/me/device-tokens:
    post:
      summary: Register an FCM device token
      security: [{ bearer: [] }]
      responses: { '204': { description: stored } }
  /v1/projects:
    get:
      summary: List published projects
      parameters:
        - { in: query, name: district, schema: { type: string } }
        - { in: query, name: state, schema: { type: string } }
      responses: { '200': { description: list } }
  /v1/projects/{id}:
    get:
      summary: Project detail (accepts a UUID or a slug — docs/10 §5.3.1)
      parameters:
        - in: path
          name: id
          required: true
          description: >
            Project id (UUID) OR slug. A canonical-UUID value is looked up by id; anything else is
            treated as a slug. Customer routes are slug-based.
          schema: { type: string }
      responses:
        '200': { description: project }
        '404': { $ref: '#/components/responses/Error' }
  /v1/projects/{id}/map:
    get:
      summary: Active site map with live plot statuses (lazy-repaired)
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        '200': { description: map }
        '404': { $ref: '#/components/responses/Error' }
  /v1/plots/{id}:
    get:
      summary: Plot detail (lazy-repaired)
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        '200': { description: plot }
        '404': { $ref: '#/components/responses/Error' }
  /v1/plots/{id}/reserve:
    post:
      summary: Reserve a plot (reserve flow — 08 §5 step 1; issues a RESERVE email OTP)
      security: [{ bearer: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
        - { in: header, name: Idempotency-Key, required: true, schema: { type: string } }
      responses:
        '201':
          description: reservation opened; verify via email OTP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReserveResult' }
        '200': { description: idempotent replay of an existing reservation }
        '409': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/reservations/{id}/confirm:
    post:
      summary: Confirm a reservation with the email OTP (08 §5 step 2 → PENDING_APPROVAL)
      security: [{ bearer: [] }]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challenge_id, otp]
              properties:
                challenge_id: { type: string }
                otp: { type: string }
      responses:
        '200': { description: confirmed; awaiting admin approval }
        '400': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/reservations/{id}/resend-otp:
    post:
      summary: Re-issue the RESERVE email OTP (owner-only; same rate limits — docs/10 §5.3.2)
      security: [{ bearer: [] }]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        '200':
          description: fresh challenge issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge_id: { type: string }
                  retry_after_seconds: { type: integer }
                  dev_otp: { type: string, nullable: true }
        '409': { $ref: '#/components/responses/Error' }
        '429': { $ref: '#/components/responses/Error' }
  /v1/bookings/{id}:
    get:
      summary: Booking detail (poll target; lazy-repaired)
      security: [{ bearer: [] }]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        '200': { description: booking }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/me/bookings:
    get:
      summary: List the caller's bookings
      security: [{ bearer: [] }]
      parameters:
        - { in: query, name: limit, schema: { type: integer } }
        - { in: query, name: cursor, schema: { type: string } }
      responses: { '200': { description: list } }
  /v1/admin/approvals:
    get:
      summary: List approvals (newest-pending-first; any admin role may view)
      security: [{ bearer: [] }]
      parameters:
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: action, schema: { type: string } }
      responses: { '200': { description: list } }
  /v1/admin/approvals/{id}:
    get:
      summary: Approval detail incl. live guardrail re-check
      security: [{ bearer: [] }]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        '200': { description: detail }
        '404': { $ref: '#/components/responses/Error' }
  /v1/admin/approvals/{id}/approve:
    post:
      summary: Approve an approval (maker≠checker; guardrails re-run at decision — MC §1)
      security: [{ bearer: [] }]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { note: { type: string } }
      responses:
        '200': { description: approved + applied }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/approvals/{id}/reject:
    post:
      summary: Reject an approval (note required — MC §1.6)
      security: [{ bearer: [] }]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties: { note: { type: string } }
      responses:
        '200': { description: rejected }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/projects:
    post:
      summary: Create a DRAFT project
      security: [{ bearer: [] }]
      responses:
        '201': { description: created }
        '403': { $ref: '#/components/responses/Error' }
  /v1/admin/projects/{id}:
    patch:
      summary: Patch non-controlled project fields
      security: [{ bearer: [] }]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses: { '200': { description: updated } }
  /v1/admin/projects/{id}/plots/bulk:
    post:
      summary: Bulk plot CSV upload (all-or-nothing; ?dry_run=true validates only)
      security: [{ bearer: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
        - { in: query, name: dry_run, schema: { type: boolean } }
      responses: { '201': { description: 'inserted + errors' } }
  /v1/admin/projects/{id}/site-maps:
    post:
      summary: Upload a site-map image (new inactive version)
      security: [{ bearer: [] }]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses: { '201': { description: uploaded } }
  /v1/admin/site-maps/{id}/geometries:
    post:
      summary: Replace plot geometries for a map version
      security: [{ bearer: [] }]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses: { '200': { description: saved } }
  /v1/admin/site-maps/{id}/activate:
    post:
      summary: Activate a map version (guarded by MAP_INCOMPLETE)
      security: [{ bearer: [] }]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        '200': { description: activated }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/notifications:
    get:
      summary: Admin notification feed (newest first; any admin role — 08 §7)
      security: [{ bearer: [] }]
      parameters:
        - { in: query, name: unread, schema: { type: boolean } }
        - { in: query, name: cursor, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer } }
      responses: { '200': { description: feed page } }
  /v1/admin/notifications/count:
    get:
      summary: Unread admin notification count (bell polls this every 30 s)
      security: [{ bearer: [] }]
      responses: { '200': { description: '{ unread: n }' } }
  /v1/admin/notifications/{id}/read:
    post:
      summary: Mark one admin notification read (shared read state — any admin clears)
      security: [{ bearer: [] }]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses: { '204': { description: marked read } }
  /v1/admin/notifications/read-all:
    post:
      summary: Mark all admin notifications read (shared read state)
      security: [{ bearer: [] }]
      responses: { '204': { description: all marked read } }
  /v1/me/notifications:
    get:
      summary: The caller's own notifications (audience CUSTOMER — 08 §7)
      security: [{ bearer: [] }]
      parameters:
        - { in: query, name: cursor, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer } }
      responses: { '200': { description: feed page } }
  /v1/admin/emails:
    get:
      summary: Outbox viewer — every email the flow generated (demo-mode sent mail — 08 §6)
      security: [{ bearer: [] }]
      parameters:
        - { in: query, name: to, schema: { type: string } }
        - { in: query, name: template, schema: { type: string } }
        - { in: query, name: cursor, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer } }
      responses: { '200': { description: outbox page } }
  /v1/admin/bookings:
    get:
      summary: Admin bookings list (joined; filter by status/project/email — newest first)
      security: [{ bearer: [] }]
      parameters:
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: project_id, schema: { type: string } }
        - { in: query, name: email, schema: { type: string } }
        - { in: query, name: cursor, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer } }
      responses: { '200': { description: bookings page } }
  /v1/admin/audit-logs:
    get:
      summary: Audit trail (SUPER_ADMIN + AUDITOR; filter by entity — API §5.7)
      security: [{ bearer: [] }]
      parameters:
        - { in: query, name: entity_type, schema: { type: string } }
        - { in: query, name: entity_id, schema: { type: string } }
        - { in: query, name: cursor, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer } }
      responses:
        '200': { description: audit page }
        '403': { $ref: '#/components/responses/Error' }
  /v1/admin/settings:
    get:
      summary: Read-only global settings (SUPER_ADMIN + AUDITOR — API §5.7)
      security: [{ bearer: [] }]
      responses:
        '200': { description: all settings }
        '403': { $ref: '#/components/responses/Error' }
  /v1/admin/dashboard/summary:
    get:
      summary: Dashboard summary — approvals/holds/inventory/recent (docs/10 §5.3.3)
      security: [{ bearer: [] }]
      responses: { '200': { description: summary } }

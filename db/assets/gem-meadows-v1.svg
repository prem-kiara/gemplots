<svg viewBox="0 0 2000 1400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <!-- Gem Meadows layout plan (D3 demo seed). Plot polygons align EXACTLY with plot_geometries. -->
  <rect x="0" y="0" width="2000" height="1400" fill="#f4f1e8"/>
  <rect x="20" y="20" width="1960" height="1360" fill="none" stroke="#9ca3af" stroke-width="2"/>

  <!-- Road bands -->
  <g class="roads">
    <rect x="40" y="532" width="1920" height="112" fill="#c9cdd4"/>
    <line x1="60" y1="588" x2="1940" y2="588" stroke="#ffffff" stroke-width="4" stroke-dasharray="34 26"/>
    <rect x="40" y="1036" width="1920" height="28" fill="#c9cdd4"/>
    <line x1="60" y1="1050" x2="1940" y2="1050" stroke="#ffffff" stroke-width="4" stroke-dasharray="34 26"/>
  </g>

  <!-- Park (row 3, right) with trees -->
  <g class="park">
    <rect x="1560" y="1092" width="320" height="224" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <circle cx="1630" cy="1141" r="18" fill="#4ade80"/>
      <circle cx="1730" cy="1204" r="18" fill="#4ade80"/>
      <circle cx="1830" cy="1141" r="18" fill="#4ade80"/>
      <circle cx="1680" cy="1260" r="18" fill="#4ade80"/>
      <circle cx="1800" cy="1267" r="18" fill="#4ade80"/>
    <text x="1720" y="1298" text-anchor="middle" fill="#166534" font-size="30" font-weight="600">PARK</text>
  </g>

  <!-- Plots -->
  <g class="plots">
    <g class="plot">
      <polygon points="200,168 560,168 560,420 200,420" fill="#d9f0dd" stroke="#166534" stroke-width="3"/>
      <text x="380" y="294" class="plotlabel" text-anchor="middle" dominant-baseline="middle">P-01</text>
    </g>
    <g class="plot">
      <polygon points="640,168 1000,168 1000,420 640,420" fill="#d9f0dd" stroke="#166534" stroke-width="3"/>
      <text x="820" y="294" class="plotlabel" text-anchor="middle" dominant-baseline="middle">P-02</text>
    </g>
    <g class="plot">
      <polygon points="1080,168 1560,168 1560,476 1080,476" fill="#d9f0dd" stroke="#166534" stroke-width="3"/>
      <text x="1320" y="322" class="plotlabel" text-anchor="middle" dominant-baseline="middle">P-03</text>
    </g>
    <g class="plot">
      <polygon points="120,700 440,700 440,1008 120,1008" fill="#d9f0dd" stroke="#166534" stroke-width="3"/>
      <text x="280" y="854" class="plotlabel" text-anchor="middle" dominant-baseline="middle">P-04</text>
    </g>
    <g class="plot">
      <polygon points="480,700 800,700 800,1008 480,1008" fill="#d9f0dd" stroke="#166534" stroke-width="3"/>
      <text x="640" y="854" class="plotlabel" text-anchor="middle" dominant-baseline="middle">P-05</text>
    </g>
    <g class="plot">
      <polygon points="840,700 1160,700 1160,1008 840,1008" fill="#d9f0dd" stroke="#166534" stroke-width="3"/>
      <text x="1000" y="854" class="plotlabel" text-anchor="middle" dominant-baseline="middle">P-06</text>
    </g>
    <g class="plot">
      <polygon points="1200,700 1520,700 1520,1008 1200,1008" fill="#d9f0dd" stroke="#166534" stroke-width="3"/>
      <text x="1360" y="854" class="plotlabel" text-anchor="middle" dominant-baseline="middle">P-07</text>
    </g>
    <g class="plot">
      <polygon points="1560,700 1880,700 1880,1008 1560,1008" fill="#d9f0dd" stroke="#166534" stroke-width="3"/>
      <text x="1720" y="854" class="plotlabel" text-anchor="middle" dominant-baseline="middle">P-08</text>
    </g>
    <g class="plot">
      <polygon points="120,1092 440,1092 440,1316 120,1316" fill="#d9f0dd" stroke="#166534" stroke-width="3"/>
      <text x="280" y="1204" class="plotlabel" text-anchor="middle" dominant-baseline="middle">P-09</text>
    </g>
    <g class="plot">
      <polygon points="480,1092 800,1092 800,1316 480,1316" fill="#d9f0dd" stroke="#166534" stroke-width="3"/>
      <text x="640" y="1204" class="plotlabel" text-anchor="middle" dominant-baseline="middle">P-10</text>
    </g>
    <g class="plot">
      <polygon points="840,1092 1160,1092 1160,1316 840,1316" fill="#d9f0dd" stroke="#166534" stroke-width="3"/>
      <text x="1000" y="1204" class="plotlabel" text-anchor="middle" dominant-baseline="middle">P-11</text>
    </g>
    <g class="plot">
      <polygon points="1200,1092 1520,1092 1520,1316 1200,1316" fill="#d9f0dd" stroke="#166534" stroke-width="3"/>
      <text x="1360" y="1204" class="plotlabel" text-anchor="middle" dominant-baseline="middle">P-12</text>
    </g>
  </g>

  <!-- Compass rose (top-right) -->
  <g class="compass" transform="translate(1880, 110)">
    <circle r="46" fill="#ffffff" stroke="#374151" stroke-width="2"/>
    <polygon points="0,-40 10,0 0,-12 -10,0" fill="#dc2626"/>
    <polygon points="0,40 10,0 0,12 -10,0" fill="#374151"/>
    <text x="0" y="-52" text-anchor="middle" font-size="22" font-weight="700" fill="#374151">N</text>
  </g>

  <!-- Title block (bottom-left) -->
  <g class="titleblock">
    <rect x="40" y="1268" width="620" height="92" fill="#ffffff" stroke="#374151" stroke-width="2"/>
    <text x="60" y="1304" font-size="34" font-weight="700" fill="#111827">GEM MEADOWS — LAYOUT PLAN</text>
    <text x="60" y="1340" font-size="24" fill="#374151">Gem Housing · Saravanampatti, Coimbatore</text>
  </g>
</svg>

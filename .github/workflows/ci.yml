name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: gemplots_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d gemplots_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL_ADMIN: postgres://postgres@localhost:5432/gemplots_test
      TEST_DATABASE_URL: postgres://gemplots_app:gemplots_app_dev@localhost:5432/gemplots_test
      TEST_DATABASE_URL_ADMIN: postgres://postgres@localhost:5432/gemplots_test
      DATABASE_URL: postgres://gemplots_app:gemplots_app_dev@localhost:5432/gemplots_test
    steps:
      - uses: actions/checkout@v4
      # F1 — npm workspaces hoist the lockfile to the repo ROOT; there is no api/package-lock.json.
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm', cache-dependency-path: package-lock.json }

      # CI gate 1: migrations apply cleanly on a fresh DB + seed loads.
      - name: Migrate + seed
        run: |
          bash db/migrate.sh
          psql "$DATABASE_URL_ADMIN" -v ON_ERROR_STOP=1 -f db/seed.sql

      - name: Install (root — installs the api workspace)
        run: npm ci

      # CI gate: typecheck.
      - name: Typecheck
        run: npm --workspace api exec -- tsc --noEmit -p tsconfig.json

      # CI gates 2-4: reserve concurrency, expiry, webhook-idempotency (dormant), cap, hold-limit, audit.
      - name: Tests (release-gating + unit)
        run: npm --workspace api run test

      # CI gate 5: OpenAPI matches implemented routes.
      - name: OpenAPI route parity
        run: npm --workspace api run openapi:parity

      - name: Build (api)
        run: npm --workspace api run build

      # CI gate 6: end-to-end (Playwright). run-e2e.sh spins up an ISOLATED stack — a fresh
      # gemplots_e2e DB + API on :3010 + Next on :3011 — runs the customer→admin golden-path
      # smoke, and tears it all down. Never touches the test/dev DBs or ports.
      - name: Install Playwright (chromium)
        run: npm --workspace web exec -- playwright install --with-deps chromium
      - name: E2E smoke (Playwright)
        env:
          PGHOST: localhost
          PGUSER: postgres
          E2E_DATABASE_URL_ADMIN: postgres://postgres@localhost:5432/gemplots_e2e
          E2E_DATABASE_URL: postgres://gemplots_app:gemplots_app_dev@localhost:5432/gemplots_e2e
        run: npm --workspace web run e2e
      - name: Upload e2e report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore
